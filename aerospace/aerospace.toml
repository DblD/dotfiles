# AeroSpace — dwm/LARBS-flavored tiling on macOS. Mod = Option (alt), matching sway box.
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

[gaps]
inner.horizontal = 6
inner.vertical = 6
outer.left = 6
outer.right = 6
outer.top = 6
outer.bottom = 6

[mode.main.binding]
# terminal + layout
alt-enter = 'exec-and-forget open -na WezTerm'
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-shift-space = 'layout floating tiling'
alt-shift-q = 'close'
alt-shift-c = 'reload-config'
alt-b = 'balance-sizes'

# focus (vim keys, dwm-style)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# workspaces (tags)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-tab = 'workspace-back-and-forth'

# PASSTHROUGH toggle: makes AeroSpace inert so all keys flow to the focused app
# (use this when streaming into river via Moonlight so Option+Enter etc. reach river).
# Hit alt-shift-p to enter, alt-shift-p again to return to normal Mac control.
alt-shift-p = 'mode passthrough'

[mode.passthrough.binding]
alt-shift-p = 'mode main'

# float dialogs / settings instead of cramming them into tiles
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.SystemPreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'
