add_newline = true
palette = "catppuccin_mocha"
command_timeout = 1000

# Line 1: context | directory | git | languages/tools | jobs | duration
# Line 2: ➜  clean typing line — full width, autocomplete never breaks
format = """
$username$hostname$directory$git_branch$git_status$git_state$fill$nodejs$golang$rust$python$php$ruby$java$kotlin$swift$terraform$kubernetes$aws$gcloud$package$jobs$cmd_duration
$character"""

# No right prompt — everything on line 1, no collision
right_format = ""

[fill]
symbol = ' '

[time]
disabled = true

[character]
vicmd_symbol = '[N](bold yellow) '
success_symbol = '[➜](bold green)'
error_symbol = '[➜](bold red)'

[directory]
format = '[$path]($style) '
style = 'bold sapphire'
truncation_length = 3
truncate_to_repo = false
home_symbol = '~'

[directory.substitutions]
'~/tests/starship-custom' = 'work-project'

[git_branch]
format = '[$symbol$branch]($style) '
style = 'bold mauve'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'bold peach'
conflicted = '✖'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?'
stashed = 'S'
modified = '!'
staged = '+'
renamed = '»'
deleted = '✘'

[nodejs]
format = '[$symbol$version]($style) '
style = 'bold green'
detect_files = ['package.json', '.nvmrc']

[golang]
format = '[$symbol$version]($style) '
style = 'bold cyan'

[rust]
format = '[$symbol$version]($style) '
style = 'bold peach'

[python]
format = '[$symbol$version]($style) '
style = 'bold yellow'

[username]
format = '[$user]($style) '
style_user = 'bold text'
style_root = 'bold red'
show_always = false  # only shows when relevant (SSH, root, etc.)

[hostname]
format = '[@$hostname]($style) '
style = 'bold overlay1'
ssh_only = true  # only shows when in SSH session

[aws]
format = '[$symbol$profile]($style) '
style = 'bold peach'
disabled = false

[kubernetes]
format = '[$symbol$context]($style) '
style = 'bold sky'
disabled = false
detect_files = ['Dockerfile', 'docker-compose.yml', 'k8s', 'helm']

[docker_context]
disabled = true

[package]
format = '[$symbol$version]($style) '
style = 'bold overlay2'

[cmd_duration]
format = 'took [$duration]($style) '
style = 'bold yellow'
min_time = 2000

[gcloud]
format = '[$symbol$account(@$domain)]($style) '
style = 'bold sky'
disabled = false

[jobs]
format = '[$symbol$number]($style) '
style = 'bold blue'
number_threshold = 1

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
